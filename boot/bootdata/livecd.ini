[FREELOADER]
DefaultOS=LiveCD_Debug
TimeOut=5

[Display]
TitleText=ReactOS LiveCD
MinimalUI=Yes

[Operating Systems]
LiveCD="MultiProcessor LiveCD"
LiveCD_MP_Debug="MultiProcessor LiveCD (Debug)"

[LiveCD]
BootType=Windows2003
SystemPath=\reactos
Options=/KERNEL=NTKRNLMP.EXE /HAL=HALMPS.DLL /FASTDETECT /MININT

[LiveCD_MP_Debug]
BootType=Windows2003
SystemPath=\reactos
Options=/DEBUG /DEBUGPORT=COM1 /BAUDRATE=115200 /SOS /MININT /KERNEL=NTKRNLMP.EXE /HAL=HALMPS.DLL
